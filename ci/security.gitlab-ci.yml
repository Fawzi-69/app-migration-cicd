# ---------------------------------------------------------------------------
# Étape scan (DevSecOps) :
#   - Trivy   : vulnérabilités de l'image conteneur (échec sur HIGH/CRITICAL)
#   - Trivy   : mauvaises configurations IaC (Terraform)
#   - Gitleaks: fuite de secrets dans l'historique/le code
#   - gosec   : analyse statique de sécurité du code Go (SAST)
# ---------------------------------------------------------------------------

# Scan de l'image poussée sur ECR (nécessite de tirer l'image -> OIDC).
trivy_image:
  stage: scan
  image:
    name: aquasec/trivy:0.56.2
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: "$AWS_OIDC_AUD"
  variables:
    AWS_ROLE_ARN: "$AWS_ROLE_ARN_DEV"
  before_script:
    - echo "$GITLAB_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
  script:
    - trivy image --no-progress --ignore-unfixed
      --severity HIGH,CRITICAL --exit-code 1
      --format table
      "${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event"

# Scan des mauvaises configurations Terraform (défense en profondeur, complète
# l'analyse Checkov locale).
trivy_iac:
  stage: scan
  image:
    name: aquasec/trivy:0.56.2
    entrypoint: [""]
  script:
    - trivy config --no-progress --severity HIGH,CRITICAL --exit-code 1 infra/terraform
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event"

# Détection de secrets en clair.
gitleaks:
  stage: scan
  image:
    name: zricethezav/gitleaks:v8.21.2
    entrypoint: [""]
  script:
    - gitleaks detect --source . --redact --no-banner --exit-code 1 --verbose
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event"

# SAST du code Go.
sast_gosec:
  stage: scan
  image:
    name: securego/gosec:2.21.4
    entrypoint: [""]
  script:
    - cd app
    - gosec -severity medium -confidence medium ./...
  rules:
    - if: $CI_COMMIT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event"
